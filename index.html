<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Fullpage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #fff;          /* белые поля */
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #video-wrapper {
      position: relative;
      flex-shrink: 0;
      /* размер задаётся JS-ом */
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div id="video-wrapper">
    <iframe
      id="yt-iframe"
      src="https://www.youtube.com/embed/IEjXOs7ehUw?autoplay=0&rel=0&modestbranding=0&iv_load_policy=3&disablekb=0&fs=0&playsinline=1&controls=0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media;
             gyroscope;"
      allowfullscreen
    ></iframe>
  </div>

  <script>
    const RATIO = 16 / 9;   // соотношение сторон видео
    const wrapper = document.getElementById('video-wrapper');

    function resize() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      let w, h;

      if (vw / vh > RATIO) {
        // страница шире — ограничиваем по высоте, поля слева/справа
        h = vh;
        w = h * RATIO;
      } else {
        // страница уже — ограничиваем по ширине, поля сверху/снизу
        w = vw;
        h = w / RATIO;
      }

      wrapper.style.width  = w + 'px';
      wrapper.style.height = h + 'px';
    }

    resize();
    window.addEventListener('resize', resize);
  </script>

</body>
</html>
